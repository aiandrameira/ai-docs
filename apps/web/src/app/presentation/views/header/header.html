<header class="flex items-center gap-0 px-6 h-14.25 border-b border-border bg-background">
    <ai-button variant="ghost"
        size="xs"
        class="flex md:hidden mr-2"
        (click)="toggle()"
        [attr.aria-label]="mobileMenuOpen() ? 'Fechar menu' : 'Abrir menu'"
        [icon]="mobileMenuOpen() ? 'close' : 'menu-fold'" />

    <doc-logo class="mr-8" />

    @if (config?.nav?.length) {
        <nav class="hidden md:flex items-center gap-1 flex-1" aria-label="Navegação principal">
            @for (item of config!.nav; track item.href) {
                <a class="text-sm font-medium text-muted-foreground px-2.5 py-1.5 rounded-md transition-colors whitespace-nowrap hover:bg-ghost hover:text-foreground"
                    [href]="item.href"
                    [target]="item.external ? '_blank' : '_self'"
                    [rel]="item.external ? 'noopener noreferrer' : null">
                    {{ item.label }}
                    @if (item.external) {
                        <ai-icon icon="external-link" size="xs" class="align-super ml-0.5" />
                    }
                </a>
            }
        </nav>
    }

    <div class="flex items-center gap-2 ml-auto">
        @if (config?.features?.search !== false) {
            <ai-button variant="ghost" size="sm" (click)="openSearch()" class="bg-primary/5 text-muted-foreground font-medium hover:bg-primary/8 relative h-8 w-max justify-start pl-4 shadow-none sm:pr-12">
                <span class="inline-flex mr-3">Pesquisar na documentação...</span>
                <div class="absolute top-1.5 right-2 hidden gap-1 sm:flex">
                    <kbd class="bg-background text-muted-foreground pointer-events-none flex h-5 items-center justify-center gap-1 rounded px-1 font-sans text-[0.7rem] font-medium select-none">
                        ⌘
                    </kbd>
                    <kbd class="bg-background text-muted-foreground pointer-events-none flex aspect-square h-5 items-center justify-center gap-1 rounded px-1 font-sans text-[0.7rem] font-medium select-none">
                        K
                    </kbd>
                </div>
            </ai-button>
        }

        @if (config?.github) {
            <ai-separator orientation="vertical" class="h-4" />
            <a ai-button
                variant="ghost"
                size="xs"
                [href]="config!.github"
                target="_blank"
                rel="noopener noreferrer"
                title="GitHub"
                aria-label="GitHub"
                icon="github"
            ></a>
        }

        @if (config?.features?.darkMode !== false) {
            <ai-separator orientation="vertical" class="h-4" />
            <ai-button variant="ghost"
                size="xs"
                (click)="toggleDark()"
                [title]="isDark() ? 'Modo claro' : 'Modo escuro'"
                [attr.aria-label]="isDark() ? 'Modo claro' : 'Modo escuro'"
                [icon]="isDark() ? 'sun' : 'moon'" />
        }
    </div>
</header>
