<div class="px-6 pt-16 pb-12 max-w-3xl mx-auto text-center">
    <span class="inline-flex items-center gap-2 px-3 py-1 rounded-full border border-accent bg-transparent text-xs font-semibold text-accent">
        <ai-icon icon="sparkling" size="xs" />
        {{ announcement }}
    </span>

    <h1 class="mt-5 font-title text-4xl md:text-5xl font-extrabold tracking-tight leading-tight text-foreground">
        Documentação estática<br />
        para projetos <span class="text-accent">TypeScript</span>.
    </h1>
    <p class="mt-4 text-lg text-muted-foreground max-w-lg mx-auto">Markdown para documentação bonita em minutos, com Angular SSR</p>

    <div class="mt-8 flex flex-wrap items-center justify-center gap-3">
        @for (action of actions; track action.href) {
            <a
                ai-button
                [variant]="action.variant"
                size="sm"
                [icon]="action.icon"
                [href]="action.href"
                [target]="action.external ? '_blank' : '_self'"
                [rel]="action.external ? 'noopener noreferrer' : null"
            >
                {{ action.label }}
            </a>
        }
    </div>
</div>

<div class="relative overflow-hidden py-4 pb-10 mask-[linear-gradient(to_right,transparent,black_8%,black_92%,transparent)]">
    <div class="marquee-track flex w-max gap-3">
        @for (item of marqueeItems; track item.key) {
            <span class="inline-flex items-center gap-2 px-3 py-1.5 rounded-full border border-border bg-muted/60 text-xs font-medium text-foreground whitespace-nowrap" [attr.aria-hidden]="item.duplicate ? 'true' : null">
                <ai-icon [icon]="item.icon" size="xs" class="text-primary" />
                {{ item.title }}
            </span>
        }
    </div>
</div>

<div class="relative max-w-4xl mx-auto mb-16 px-6">
    <div
        class="absolute -inset-20 -z-10 rounded-full blur-3xl opacity-30"
        style="background: radial-gradient(circle at 30% 30%, var(--accent), transparent 60%), radial-gradient(circle at 70% 70%, var(--primary), transparent 60%)"
    ></div>

    <div class="preview-window w-full h-125 rounded-xl border border-border bg-background shadow-2xl overflow-hidden flex flex-col">
        <div class="flex items-center gap-2 px-4 py-3 border-b border-border bg-muted shrink-0">
            <span class="w-3 h-3 rounded-full bg-destructive/60"></span>
            <span class="w-3 h-3 rounded-full bg-warning/60"></span>
            <span class="w-3 h-3 rounded-full bg-success/60"></span>
            <span class="ml-2 flex-1 max-w-xs text-xs text-muted-foreground bg-background rounded px-2.5 py-1 truncate">localhost:4555</span>
        </div>
        <div class="flex flex-1 min-h-0">
            <div class="w-44 border-r border-border p-6 flex flex-col gap-4">
                <div class="h-2.5 w-24 rounded-full bg-primary/70"></div>
                <div class="skeleton-bar h-2.5 w-18 rounded-full bg-muted-foreground/30"></div>
                <div class="skeleton-bar h-2.5 w-20 rounded-full bg-muted-foreground/30"></div>
                <div class="skeleton-bar h-2.5 w-16 rounded-full bg-muted-foreground/30"></div>
                <div class="skeleton-bar h-2.5 w-20 rounded-full bg-muted-foreground/30"></div>
                <div class="skeleton-bar h-2.5 w-14 rounded-full bg-muted-foreground/30"></div>
            </div>
            <div class="flex-1 p-12">
                <div class="h-5 w-60 rounded-full bg-foreground/80 mb-8"></div>
                <div class="skeleton-bar h-3 w-full rounded-full bg-muted-foreground/25 mb-3"></div>
                <div class="skeleton-bar h-3 w-5/6 rounded-full bg-muted-foreground/25 mb-3"></div>
                <div class="skeleton-bar h-3 w-4/6 rounded-full bg-muted-foreground/25 mb-3"></div>
                <div class="skeleton-bar h-3 w-3/5 rounded-full bg-muted-foreground/25 mb-8"></div>
                <div class="skeleton-bar h-3 w-full rounded-full bg-muted-foreground/25 mb-3"></div>
                <div class="skeleton-bar h-3 w-2/3 rounded-full bg-muted-foreground/25"></div>
            </div>
        </div>
    </div>
</div>

<doc-footer />
