@if (item().children?.length) {
    <li>
        <div class="px-5 pt-4 pb-1 font-title text-[10px] font-bold uppercase tracking-wider text-muted-foreground">
            {{ item().title }}
        </div>
        <ul class="list-none p-0 m-0 pl-4">
            @for (child of item().children; track child.href) {
                <doc-sidebar-item [item]="child" />
            }
        </ul>
    </li>
} @else {
    <li class="my-0.5">
        <a [href]="item().href"
            class="relative flex items-center font-semibold gap-2 py-1.5 px-5 rounded-sm text-sm text-muted-foreground transition-colors hover:bg-ghost hover:text-primary"
            [ngClass]="item().active ? activeClass : null">
            {{ item().title }}
        </a>
    </li>
}
